<body style="background-color: orange; font-family: Italic;">

  <div style="
  background-color: white;
  padding: 30px;
  width: 320px;
  margin: 60px auto;
  text-align: center;
  border-radius: 12px;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
">

    <h1>Danny</h1>
    <h2>Center Back</h2>

    <table style="margin: auto; margin-top: 10px;">
      <tr>
        <td>Matches Played</td>
        <td id="matches">250</td>
      </tr>
      <tr>
        <td>Tackles Won</td>
        <td id="tackles">95</td>
      </tr>
      <tr>
        <td>Goals</td>
        <td>2</td>
      </tr>
      <tr>
        <td>Interceptions</td>
        <td>123</td>
      </tr>
      <tr>
        <td>Clearances</td>
        <td>89</td>
      </tr>
    </table>

    <br>

    <button onclick="updateStats()">Update Stats</button>
    <br><br>
     <button onclick="resetStats()">Reset Stats</button>

  </div>

 <script>
  function updateStats() {
    // Matches +1
    let currentMatches = document.getElementById("matches").innerText;
    document.getElementById("matches").innerText = Number(currentMatches) + 1;

    // Tackles +2
    let currentTackles = document.getElementById("tackles").innerText;
    document.getElementById("tackles").innerText = Number(currentTackles) + 2;
  }

  function resetStats() {
    document.getElementById("matches").innerText = 999;
    document.getElementById("tackles").innerText = 777;
  }
</script>

</body>
