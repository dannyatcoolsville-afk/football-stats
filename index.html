<style>
  .btn {
    background-color: #222;
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin: 6px;
    transition: 0.2s;
  }

  .btn.secondary {
    background-color: #444;
  }

 .btn:hover {
  background-color: #333;
  transform: translateY(-2px);
}
  
  .btn:active {
    transform: translateY(1px);
  }
</style>

<body style="background-color: #ff9800; font-family: 'Segoe UI', Arial, sans-serif;">

  <div style="
  background-color: white;
  padding: 30px;
  width: 320px;
  margin: 60px auto;
  text-align: center;
  border-radius: 12px;
  box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
">

    <h1>Danny</h1>
    <h2 style="
  color: #555;
  margin-top: 0;
  font-weight: normal;
">
  Center Back
</h2>

    <table style="margin: auto; margin-top: 20px;">
      <tr>
       <td style="padding: 6px 12px; color: #333;">Matches Played</td>
<td id="matches" style="padding: 6px 12px; font-weight: bold;">250</td>
      </tr>
      <tr>
  <td style="padding: 6px 12px; color: #333;">Tackles Won</td>
  <td id="tackles" style="padding: 6px 12px; font-weight: bold;">95</td>
</tr>
     <tr>
  <td style="padding: 6px 12px; color: #333;">Goals</td>
  <td id="goals" style="padding: 6px 12px; font-weight: bold;">2</td>
</tr>
     <tr>
  <td style="padding: 6px 12px; color: #333;">Interceptions</td>
  <td id="interceptions" style="padding: 6px 12px; font-weight: bold;">9</td>
</tr>
<tr>
  <td style="padding: 6px 12px; color: #333;">Clearances</td>
  <td id="clearances" style="padding: 6px 12px; font-weight: bold;">98</td>
</tr>
    </table>

    <br>
    
    <button class="btn" onclick="updateStats()">Update Stats</button>
    
    <button class="btn secondary" onclick="resetStats()">Reset Stats</button>
    
     <p id="quote" style="margin-top: 20px; font-style: italic;">
  Click to get a quote ⚽
</p>
  <button class="btn" onclick="getQuote()">Get Motivation</button>
    
    <p id="match" style="margin-top: 20px;">
  Click to get a match
</p>
<button class="btn" onclick="getPlayer()">Get Match</button>
    
  </div>

  
 <script>
  function updateStats() {
    // Matches +1
    let currentMatches = document.getElementById("matches").innerText;
    document.getElementById("matches").innerText = Number(currentMatches) + 1;

    // Tackles +2
    let currentTackles = document.getElementById("tackles").innerText;
    document.getElementById("tackles").innerText = Number(currentTackles) + 2;
  }

  function resetStats() {
    document.getElementById("matches").innerText = 999;
    document.getElementById("tackles").innerText = 777;
  }

function getQuote() {
  fetch("https://api.adviceslip.com/advice")
    .then(response => response.json())
    .then(data => {
      document.getElementById("quote").innerText = data.slip.advice;
    })
    .catch(error => {
      document.getElementById("quote").innerText = "Failed to load advice.";
    });
}

   function getMatch() {
  fetch("https://raw.githubusercontent.com/openfootball/football.json/master/2015-16/en.1.json")
    .then(res => res.json())
    .then(data => {
      console.log(data); // 👈 important for learning

      // pick a random match
      let matches = data.matches;
      let randomMatch = matches[Math.floor(Math.random() * matches.length)];

      let team1 = randomMatch.team1;
      let team2 = randomMatch.team2;

      document.getElementById("match").innerText =
        team1 + " vs " + team2;
    })
    .catch(err => {
      document.getElementById("match").innerText = "Failed to load data.";
    });
}
</script>

</body>
